name: Dependency Check

on:
  workflow_call:

permissions:
  contents: read
  issues: write

# 同一リポジトリでの同時実行を直列化し、Issue の二重作成/二重クローズを防ぐ。
# github.repository は呼び出し元リポジトリに解決される。
concurrency:
  group: dep-check-${{ github.repository }}
  cancel-in-progress: false

jobs:
  dep-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v2

      # lockfile から PM を検出する。優先順位 pnpm → yarn → bun → npm。
      # package-lock.json は他 PM 併用時にも生成されがちなので最後に回す。
      # 1 つも無ければ pm=none を出力し、後続の依存チェック step を全てスキップする。
      - name: Detect package manager
        id: detect
        run: |
          if [ -f pnpm-lock.yaml ]; then
            PM=pnpm
          elif [ -f yarn.lock ]; then
            PM=yarn
          elif [ -f bun.lockb ] || [ -f bun.lock ]; then
            PM=bun
          elif [ -f package-lock.json ]; then
            PM=npm
          else
            PM=none
          fi
          echo "pm=$PM" >> "$GITHUB_OUTPUT"
          echo "検出した PM: $PM"

      # install は lockfile 整合確認が目的のため失敗を可視化する（|| true で握らない）。
      # 依存の postinstall を実行しない（サプライチェーン対策）。yarn berry は
      # --ignore-scripts フラグが無いため YARN_ENABLE_SCRIPTS=false で代替する。
      # yarn は classic(v1) に --immutable が無く berry(v2+) に --frozen-lockfile が無いため
      # yarn -v の major で分岐する。
      - name: Install dependencies
        if: steps.detect.outputs.pm != 'none'
        env:
          PM: ${{ steps.detect.outputs.pm }}
        run: |
          case "$PM" in
            npm)  npm ci --ignore-scripts ;;
            pnpm) pnpm install --frozen-lockfile --ignore-scripts ;;
            bun)  bun install --frozen-lockfile --ignore-scripts ;;
            yarn)
              if [ "$(yarn -v | cut -d. -f1)" -ge 2 ]; then
                YARN_ENABLE_SCRIPTS=false yarn install --immutable
              else
                yarn install --frozen-lockfile --ignore-scripts
              fi
              ;;
          esac

      # Node.js EOL チェック
      - name: Check Node.js EOL
        id: node-eol
        if: steps.detect.outputs.pm != 'none'
        run: |
          NODE_MAJOR=$(node -v | sed 's/v\([0-9]*\).*/\1/')
          NODE_CURRENT=$(node -v | sed 's/v//')

          # endoflife.date は一時障害/レート制限で落ちうるため retry し、最終的に失敗したら
          # EOL 判定をスキップしてワークフロー全体は継続する
          EOL_DATA=""
          for _ in 1 2 3; do
            EOL_DATA=$(curl -sf --max-time 10 "https://endoflife.date/api/nodejs/${NODE_MAJOR}.json") && break
            sleep 2
          done

          REPORT=""
          if [ -z "$EOL_DATA" ]; then
            REPORT="⚠️ Node.js の EOL 情報取得に失敗 (endoflife.date)。EOL 判定をスキップしました"
          else
            EOL_DATE=$(echo "$EOL_DATA" | jq -r '.eol')
            LATEST=$(echo "$EOL_DATA" | jq -r '.latest')

            # EOL まで 90 日以内かチェック
            TODAY=$(date +%s)
            EOL_TS=$(date -d "$EOL_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$EOL_DATE" +%s 2>/dev/null || echo "0")
            DAYS_LEFT=$(( (EOL_TS - TODAY) / 86400 ))

            if [ "$DAYS_LEFT" -lt 90 ] && [ "$DAYS_LEFT" -gt 0 ]; then
              REPORT="⚠️ Node.js ${NODE_MAJOR} の EOL まで残り ${DAYS_LEFT} 日 (${EOL_DATE})"
            elif [ "$DAYS_LEFT" -le 0 ]; then
              REPORT="🚨 Node.js ${NODE_MAJOR} は EOL を過ぎています (${EOL_DATE})"
            fi

            if [ "$NODE_CURRENT" != "$LATEST" ]; then
              REPORT="${REPORT}\n📦 Node.js アップデート: v${NODE_CURRENT} → v${LATEST}"
            fi
          fi

          # .mise.toml のバージョンと実際のバージョンを比較
          MISE_NODE=$(grep '^node' .mise.toml | sed 's/.*"\(.*\)".*/\1/')
          ACTUAL_NODE=$(node -v | sed 's/v//')
          if [ "$MISE_NODE" != "$ACTUAL_NODE" ]; then
            REPORT="${REPORT}\n⚠️ Node.js バージョン不一致: mise.toml=${MISE_NODE}, 実際=${ACTUAL_NODE}"
          fi

          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "version=$(node -v)" >> "$GITHUB_OUTPUT"

      # PM バージョンチェック。実体と最新版を比較する。
      # npm/pnpm/yarn classic(v1) は npm レジストリの最新版と比較する。
      # yarn berry(v2+) は npm の yarn が classic 系列(1.x)を返すため比較対象から除外する
      # （実体バージョンは Issue 本文用に出力する）。
      # bun は npm レジストリではなく GitHub Releases (oven-sh/bun) が公式配布経路のため、
      # そこから最新版を取得する。
      # LATEST が空（取得失敗 / berry 除外）なら比較しない。
      - name: Check package manager version
        id: pm-check
        if: steps.detect.outputs.pm != 'none'
        env:
          PM: ${{ steps.detect.outputs.pm }}
          GH_TOKEN: ${{ github.token }}
        run: |
          ACTUAL=$("$PM" --version)
          LATEST=""
          if [ "$PM" = yarn ] && [ "$(echo "$ACTUAL" | cut -d. -f1)" -ge 2 ]; then
            :
          elif [ "$PM" = bun ]; then
            LATEST=$(gh api repos/oven-sh/bun/releases/latest --jq '.tag_name' 2>/dev/null | sed 's/^bun-v//') || true
          else
            LATEST=$(npm view "$PM" version)
          fi
          REPORT=""
          if [ -n "$LATEST" ] && [ "$ACTUAL" != "$LATEST" ]; then
            REPORT="📦 ${PM} アップデート: v${ACTUAL} → v${LATEST}"
          fi

          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "version=$ACTUAL" >> "$GITHUB_OUTPUT"
          echo "name=$PM" >> "$GITHUB_OUTPUT"

      # npm-check-updates でアップデートチェック
      # 出力が巨大になり環境変数では ARG_MAX を超えるため、ファイル経由で受け渡す
      # --cooldown 7d: 公開から 7 日未満のバージョンを除外（サプライチェーン対策）。
      # latest はフォールバックで cooldown を満たす最大版を提案する。
      - name: Check patch updates
        if: steps.detect.outputs.pm != 'none'
        run: npx -y npm-check-updates --target patch --cooldown 7d > "$RUNNER_TEMP/patch.txt" 2>/dev/null || true

      - name: Check minor updates
        if: steps.detect.outputs.pm != 'none'
        run: npx -y npm-check-updates --target minor --cooldown 7d > "$RUNNER_TEMP/minor.txt" 2>/dev/null || true

      - name: Check major updates
        if: steps.detect.outputs.pm != 'none'
        run: npx -y npm-check-updates --target latest --cooldown 7d > "$RUNNER_TEMP/major.txt" 2>/dev/null || true

      # audit。各 PM とも || true で握り結果を audit.txt へ出力する（失敗してもワークフロー継続）。
      # yarn は classic に yarn audit、berry(v2+) に yarn npm audit --all --recursive。
      - name: Check vulnerabilities
        if: steps.detect.outputs.pm != 'none'
        env:
          PM: ${{ steps.detect.outputs.pm }}
        run: |
          case "$PM" in
            npm)  npm audit > "$RUNNER_TEMP/audit.txt" 2>&1 || true ;;
            pnpm) pnpm audit --prod > "$RUNNER_TEMP/audit.txt" 2>&1 || true ;;
            bun)  bun audit > "$RUNNER_TEMP/audit.txt" 2>&1 || true ;;
            yarn)
              if [ "$(yarn -v | cut -d. -f1)" -ge 2 ]; then
                yarn npm audit --all --recursive > "$RUNNER_TEMP/audit.txt" 2>&1 || true
              else
                yarn audit > "$RUNNER_TEMP/audit.txt" 2>&1 || true
              fi
              ;;
          esac

      # レポート生成 & Issue 作成
      - name: Create issue if updates found
        if: steps.detect.outputs.pm != 'none'
        uses: actions/github-script@v7
        env:
          NODE_EOL: ${{ steps.node-eol.outputs.report }}
          PM_REPORT: ${{ steps.pm-check.outputs.report }}
          NODE_VERSION: ${{ steps.node-eol.outputs.version }}
          PM_VERSION: ${{ steps.pm-check.outputs.version }}
          PM_NAME: ${{ steps.pm-check.outputs.name }}
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');
            const readReport = (name) => {
              const p = path.join(process.env.RUNNER_TEMP, name);
              return fs.existsSync(p) ? fs.readFileSync(p, 'utf8') : '';
            };
            const nodeEol = process.env.NODE_EOL?.trim() || '';
            const pmReport = process.env.PM_REPORT?.trim() || '';
            const pmName = process.env.PM_NAME || '';
            const patch = readReport('patch.txt');
            const minor = readReport('minor.txt');
            const major = readReport('major.txt');
            const audit = readReport('audit.txt');

            // ncu 出力からパッケージ名を抽出する
            const parsePackageNames = (ncuOutput) => {
              const names = new Set();
              for (const line of ncuOutput.split('\n')) {
                // " eslint  10.1.0  →  10.2.0" のような行を検出
                const match = line.match(/^\s+(\S+)\s+\S+\s+→\s+\S+/);
                if (match) names.add(match[1]);
              }
              return names;
            };

            // ncu 出力から指定パッケージの行を除外する
            const filterOutput = (ncuOutput, excludeNames) => {
              if (excludeNames.size === 0) return ncuOutput;
              const lines = ncuOutput.split('\n');
              const filtered = lines.filter(line => {
                const match = line.match(/^\s+(\S+)\s+\S+\s+→\s+\S+/);
                return !match || !excludeNames.has(match[1]);
              });
              // フィルタ後にパッケージ行が残っていなければ「全て最新」メッセージに置換
              const hasPackages = filtered.some(l => l.match(/^\s+\S+\s+\S+\s+→\s+\S+/));
              if (!hasPackages) {
                return 'All dependencies match the latest package versions :)';
              }
              // "Run npx ..." 行も除外（パッケージがない場合は不要）
              return filtered.filter(l => !l.trimStart().startsWith('Run npx')).join('\n');
            };

            const patchPkgs = parsePackageNames(patch);
            const minorPkgs = parsePackageNames(minor);

            // マイナーからパッチ重複を除外、メジャーからパッチ+マイナー重複を除外
            const filteredMinor = filterOutput(minor, patchPkgs);
            const filteredMajor = filterOutput(major, new Set([...patchPkgs, ...minorPkgs]));

            // ncu の「全て最新」メッセージ判定
            // cooldown 等でメッセージ中に文言が差し込まれる場合があるため
            // "All dependencies" と "match...package versions" の間を緩く許容して判定する
            const isAllLatest = (r) => /All dependencies[^\n]*match[^\n]*package versions/.test(r);
            const allLatest = [patch, filteredMinor, filteredMajor].every(isAllLatest);
            // 「脆弱性なし」判定文言は PM ごとに異なる:
            // npm=found 0 vulnerabilities / pnpm=No known vulnerabilities found /
            // yarn classic=0 vulnerabilities found / yarn berry=No audit suggestions /
            // bun=No vulnerabilities found
            const noVulnerabilities =
              audit.includes('found 0 vulnerabilities') ||
              audit.includes('No known vulnerabilities found') ||
              audit.includes('0 vulnerabilities found') ||
              audit.includes('No audit suggestions') ||
              audit.includes('No vulnerabilities found');
            const noNodeIssue = nodeEol === '';
            const noPmIssue = pmReport === '';

            if (allLatest && noVulnerabilities && noNodeIssue && noPmIssue) {
              console.log('全て最新・問題なし。Issue は作成しません。');
              return;
            }

            const today = new Date().toISOString().split('T')[0];
            const title = `📦 依存性チェックレポート (${today})`;

            let body = `# 依存性チェックレポート\n\n`;
            body += `**実行日**: ${today}\n`;
            body += `**Node.js**: ${process.env.NODE_VERSION}\n`;
            body += `**${pmName}**: v${process.env.PM_VERSION}\n\n`;

            if (nodeEol) {
              body += `## Node.js ステータス\n\n${nodeEol}\n\n`;
            }

            if (pmReport) {
              body += `## ${pmName} ステータス\n\n${pmReport}\n\n`;
            }

            // GitHub Issue 本文の上限は 65536 文字。各セクション個別に切り詰めて収める。
            const truncate = (s, max) => {
              if (s.length <= max) return s;
              return s.slice(0, max) + `\n...(省略: ${s.length - max} 文字)`;
            };
            body += `## パッチアップデート\n\n\`\`\`\n${truncate(patch, 10000)}\n\`\`\`\n\n`;
            body += `## マイナーアップデート\n\n\`\`\`\n${truncate(filteredMinor, 10000)}\n\`\`\`\n\n`;
            body += `## メジャーアップデート\n\n\`\`\`\n${truncate(filteredMajor, 10000)}\n\`\`\`\n\n`;
            body += `## セキュリティ監査\n\n\`\`\`\n${truncate(audit, 20000)}\n\`\`\`\n\n`;
            body += `---\n🤖 GitHub Actions により自動生成`;

            // 最終セーフガード: 念のため全体を 65000 文字に切る
            if (body.length > 65000) {
              body = body.slice(0, 65000) + '\n\n...(本文が上限を超えたため切り詰め)';
            }

            // body から日付に依存する行を除去して比較用に正規化
            const normalize = (s) => s
              .replace(/\*\*実行日\*\*:.*\n/, '')
              .replace(/^📦 依存性チェックレポート \(\d{4}-\d{2}-\d{2}\)/, '');
            const crypto = require('node:crypto');
            const hash = (s) => crypto.createHash('sha256').update(s).digest('hex');
            const newHash = hash(normalize(body));

            // 既存の依存性レポート Issue を取得（paginate で 30 件超のリポジトリも取りこぼさない）
            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies',
              per_page: 100,
            });
            const reportIssues = existingIssues.filter(i =>
              i.title.startsWith('📦 依存性チェックレポート')
            );

            // 最新 Issue と内容が一致するならスキップ
            const latest = reportIssues.sort((a, b) =>
              new Date(b.created_at) - new Date(a.created_at)
            )[0];
            if (latest && hash(normalize(latest.body || '')) === newHash) {
              console.log('既存 Issue と内容が一致。作成をスキップします。');
              return;
            }

            // 既存レポート Issue をクローズ
            for (const issue of reportIssues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['dependencies'],
            });
